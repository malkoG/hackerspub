type Account implements Node {
  actor: Actor!
  avatarUrl: URL!
  bio: Markdown!
  created: DateTime!
  id: ID!
  invitees(after: String, before: String, first: Int, last: Int): AccountInviteesConnection!
  inviter: Account
  leftInvitations: Int!
  links: [AccountLink!]!
  locales: [Locale!]!
  moderator: Boolean!
  name: String!
  updated: DateTime!
  username: String!
  usernameChanged: DateTime
  uuid: UUID!
}

type AccountInviteesConnection {
  edges: [AccountInviteesConnectionEdge!]!
  pageInfo: PageInfo!
}

type AccountInviteesConnectionEdge {
  cursor: String!
  node: Account!
}

type AccountLink implements Node {
  created: DateTime!
  handle: String
  icon: String!
  id: ID!
  index: Int!
  name: String!
  url: URL!
  verified: DateTime
}

input AccountLinkInput {
  name: String!
  url: URL!
}

type Actor implements Node {
  account: Account
  automaticallyApprovesFollowers: Boolean!
  avatarUrl: URL!
  bio: HTML
  created: DateTime!
  followees(after: String, before: String, first: Int, last: Int): ActorFolloweesConnection!
  followers(after: String, before: String, first: Int, last: Int): ActorFollowersConnection!
  handle: String!
  handleHost: String!
  headerUrl: URL
  id: ID!
  instance: Instance
  instanceHost: String!
  iri: URL!
  name: HTML
  pins(after: String, before: String, first: Int, last: Int): ActorPinsConnection!
  posts(after: String, before: String, first: Int, last: Int): ActorPostsConnection!
  published: DateTime
  rawName: String
  sensitive: Boolean!
  successor: Actor
  type: ActorType!
  updated: DateTime!
  url: URL
  username: String!
  uuid: UUID!
}

type ActorFolloweesConnection {
  edges: [ActorFolloweesConnectionEdge!]!
  pageInfo: PageInfo!
}

type ActorFolloweesConnectionEdge {
  accepted: DateTime
  created: DateTime!
  cursor: String!
  iri: URL!
  node: Actor!
}

type ActorFollowersConnection {
  edges: [ActorFollowersConnectionEdge!]!
  pageInfo: PageInfo!
}

type ActorFollowersConnectionEdge {
  accepted: DateTime
  created: DateTime!
  cursor: String!
  iri: URL!
  node: Actor!
}

type ActorPinsConnection {
  edges: [ActorPinsConnectionEdge!]!
  pageInfo: PageInfo!
}

type ActorPinsConnectionEdge {
  cursor: String!
  node: Post!
}

type ActorPostsConnection {
  edges: [ActorPostsConnectionEdge!]!
  pageInfo: PageInfo!
}

type ActorPostsConnectionEdge {
  cursor: String!
  node: Post!
}

enum ActorType {
  APPLICATION
  GROUP
  ORGANIZATION
  PERSON
  SERVICE
}

type Article implements Node & Post & Reactable {
  account: Account!
  actor: Actor!
  allowLlmTranslation: Boolean!
  content: HTML!
  engagementStats: PostEngagementStats!
  hashtags: [Hashtag!]!
  id: ID!
  iri: URL!
  language: String
  link: PostLink
  media: [PostMedium!]!
  mentions(after: String, before: String, first: Int, last: Int): PostMentionsConnection!
  name: String
  published: DateTime!
  publishedYear: Int!
  quotedPost: Post
  quotes(after: String, before: String, first: Int, last: Int): PostQuotesConnection!
  reactionGroups: [ReactionGroup!]!
  replies(after: String, before: String, first: Int, last: Int): PostRepliesConnection!
  replyTarget: Post
  sensitive: Boolean!
  sharedPost: Post
  shares(after: String, before: String, first: Int, last: Int): PostSharesConnection!
  slug: String!
  summary: String
  tags: [String!]!
  updated: DateTime!
  url: URL
  visibility: PostVisibility!
}

input CreateNoteInput {
  clientMutationId: ID
  content: Markdown!
  language: Locale!
  quotedPostId: ID
  replyTargetId: ID
  visibility: PostVisibility!
}

type CreateNotePayload {
  clientMutationId: ID
  note: Note!
}

type CustomEmoji implements Node {
  id: ID!
  imageUrl: String!
  iri: URL!
  name: String!
}

type CustomEmojiReactionGroup implements ReactionGroup {
  customEmoji: CustomEmoji!
  reactors(after: String, before: String, first: Int, last: Int): ReactionGroupReactorsConnection!
  subject: Reactable!
}

"""
A date string, such as 2007-12-03, compliant with the `full-date` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar Date

"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, compliant with the `date-time` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar DateTime

type EmojiReactionGroup implements ReactionGroup {
  emoji: String!
  reactors(after: String, before: String, first: Int, last: Int): ReactionGroupReactorsConnection!
  subject: Reactable!
}

"""An HTML string."""
scalar HTML

type Hashtag {
  href: URL!
  name: String!
}

type Instance implements Node {
  created: DateTime!
  host: String!
  id: ID!
  software: String
  softwareVersion: String
  updated: DateTime!
}

"""The locale in the format of a BCP 47 (RFC 5646) standard string"""
scalar Locale

"""A Hackers' Pub-flavored Markdown text."""
scalar Markdown

scalar MediaType

type Mutation {
  createNote(input: CreateNoteInput!): CreateNotePayload!
  updateAccount(input: UpdateAccountInput!): UpdateAccountPayload!
}

interface Node {
  id: ID!
}

type Note implements Node & Post & Reactable {
  actor: Actor!
  content: HTML!
  engagementStats: PostEngagementStats!
  hashtags: [Hashtag!]!
  id: ID!
  iri: URL!
  language: String
  link: PostLink
  media: [PostMedium!]!
  mentions(after: String, before: String, first: Int, last: Int): PostMentionsConnection!
  name: String
  published: DateTime!
  quotedPost: Post
  quotes(after: String, before: String, first: Int, last: Int): PostQuotesConnection!
  reactionGroups: [ReactionGroup!]!
  replies(after: String, before: String, first: Int, last: Int): PostRepliesConnection!
  replyTarget: Post
  sensitive: Boolean!
  sharedPost: Post
  shares(after: String, before: String, first: Int, last: Int): PostSharesConnection!
  summary: String
  updated: DateTime!
  url: URL
  visibility: PostVisibility!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type Poll implements Node {
  ends: DateTime!
  id: ID!
  multiple: Boolean!
  options: [PollOption!]!
